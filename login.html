<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmoSync</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 class="login-title">🔐 Login</h2>
            <p class="login-subtitle">Masuk ke akun EmoSync Anda</p>
            <form id="loginForm" class="login-form">
                <input type="text" id="loginUsername" placeholder="Username" required class="form-input">
                <input type="password" id="loginPassword" placeholder="Password" required class="form-input">
                <button type="submit" class="login-btn">Login</button>
            </form>
            <p class="login-link">Belum punya akun? <a href="register.html">Register</a></p>
            <div id="loginError" class="error-message" style="display: none;"></div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
